version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: heapmaster_db
    environment:
      POSTGRES_USER: heapmaster
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: heapmaster_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heapmaster"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heapmaster_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: heapmaster_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heapmaster_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heapmaster_api
    environment:
      DATABASE_URL: postgresql://heapmaster:secure_password_here@postgres:5432/heapmaster_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      DEBUG: "false"
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    networks:
      - heapmaster_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Frontend (optional - can be served separately)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: heapmaster_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - heapmaster_network

  # Celery Worker (for background tasks)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heapmaster_celery
    environment:
      DATABASE_URL: postgresql://heapmaster:secure_password_here@postgres:5432/heapmaster_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - heapmaster_network
    command: celery -A app.celery worker --loglevel=info

  # Celery Flower (for monitoring)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heapmaster_flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - heapmaster_network
    command: celery -A app.celery flower --port=5555

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  heapmaster_network:
    driver: bridge
